name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        run: |
          cd internal/ui/frontend
          npm install
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: internal/ui/frontend/dist/

  test:
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: internal/ui/frontend/dist/

      - name: Run tests
        run: go test ./internal/...

      - name: Vet
        run: go vet ./internal/...

  build:
    runs-on: macos-14
    needs: [build-frontend, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: internal/ui/frontend/dist/

      - name: Build macOS binary
        run: CGO_LDFLAGS="-framework UniformTypeIdentifiers" go build -tags production -o egressor ./cmd/egressor

      - name: Verify binary
        run: ./egressor --version