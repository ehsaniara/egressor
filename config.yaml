listen_address: "127.0.0.1:8080"

policy:

  # --- Scope ---
  # Only allow files from these directories. Everything else is blocked.
  # Leave empty to allow all directories (default).
  allowed_directories:
    # - "~/Projects/my-app"

  # --- File patterns (hard block) ---
  # Block any request that references files matching these glob patterns.
  # Blocked immediately — no user prompt.
  deny_file_patterns:
    - "*.env"
    - "*.pem"
    - "*.key"
    - "**/secrets/**"
    - "**/credentials*"
    - ".aws/*"

  # --- File tags (hard block) ---
  # Developers add these tags as comments in their source files
  # (e.g. // NO_LLM at the top of a file) to prevent the file from
  # being sent to any LLM. Blocked immediately — no user prompt.
  deny_content_tags:
    - "NO_LLM"

  # --- Content keywords (interactive) ---
  # When a request body contains any of these keywords, Egressor pauses
  # and asks the user to Allow or Block before forwarding.
  # Users can choose:
  #   Allow Once    — forward this request
  #   Allow Always  — forward and add file to content_whitelist
  #   Block Once    — return 403
  #   Block Always  — return 403 and add file to content_blacklist
  deny_content_keywords:
    - "CONFIDENTIAL"
    - "INTERNAL ONLY"

  # --- Whitelist / Blacklist (auto-managed) ---
  # These are populated automatically when users choose "Allow Always"
  # or "Block Always" in the UI. You can also edit them manually.
  # Files in the whitelist skip keyword prompts. Files in the blacklist
  # are blocked automatically when a keyword matches.
  content_whitelist: []
  content_blacklist: []

logging:
  format: json
  file: ~/.egressor/logs/audit.log
  max_size_mb: 2

intercept:
  ca_cert: ~/.egressor/ca.pem
  ca_key: ~/.egressor/ca-key.pem
  log_body: true
  max_body_size: 1048576    # 1MB