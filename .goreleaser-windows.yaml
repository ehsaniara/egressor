version: 2

builds:
  - id: egressor-windows-amd64
    main: ./cmd/egressor
    binary: egressor
    goos:
      - windows
    goarch:
      - amd64
    env:
      - CGO_ENABLED=1
    flags:
      - -trimpath
      - -tags=production
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: egressor-windows-arm64
    main: ./cmd/egressor
    binary: egressor
    goos:
      - windows
    goarch:
      - arm64
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: egressor-windows
    builds:
      - egressor-windows-amd64
      - egressor-windows-arm64
    format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - config.yaml
      - README.md
      - LICENSE

checksum:
  name_template: "checksums_windows.txt"

release:
  github:
    owner: ehsaniara
    name: egressor